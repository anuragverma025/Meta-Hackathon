difficulty: 5
description: >
  FULL CHAOS. Maximum pressure across every dimension simultaneously.
  Seven tickets including three P1s with SLAs of 2-3 steps — any
  hesitation causes an immediate breach. Engineers pool is 3 against
  7 concurrent issues. Budget starts at $20 000 — a single large
  approval exhausts it; agents must sequence spends carefully.
  Five deals are in active stages; four have already gone several
  steps without contact and will be lost if Finance doesn't act fast.
  Task dependency graph is deep and wide: TASK-006 and TASK-007 each
  require four predecessors to complete first, creating a critical path
  that spans the full 80-step episode. Schema drift fires at steps 20,
  40, and 60 (three events) — the most of any scenario — so the schema
  will have mutated up to 6 fields by the end. Noise at 12%.
  The Oversight agent will be kept very busy: expect hallucinations from
  agents that haven't adapted to drift, policy breaches from Finance under
  pressure, and loop detection triggering on panicked agents stuck retrying
  failed calls. Perfect score requires flawless coordination, zero SLA
  breaches, full schema adaptation, and every deal kept warm.
episode_length: 80
schema_drift_enabled: true
noise_rate: 0.12

resource_pool:
  engineers: 3
  budget: 20000
  compute: 8

